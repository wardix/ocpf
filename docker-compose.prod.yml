version: '3.8'

services:
  postgres:
    ports: []  # Do not expose postgres port in production
    restart: always

  redis:
    ports: []  # Do not expose redis port in production
    command: redis-server --save 60 1 --appendonly yes
    restart: always

  main-api:
    ports: []  # Use gateway for external access in production
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://omni:omni_password@postgres:5432/omni}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://yourdomain.com}

  wa-adapter:
    restart: always
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379

  telegram-adapter:
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://omni:omni_password@postgres:5432/omni}
      REDIS_HOST: redis
      REDIS_PORT: 6379

  email-adapter:
    restart: always
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379

  frontend:
    ports: []  # Use gateway for external access in production
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-https://yourdomain.com}
        - VITE_WS_URL=${VITE_WS_URL:-wss://yourdomain.com/ws}
    restart: always

  gateway:
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME:-yourdomain.com}
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro  # Mount SSL certs directory in production
    restart: always

  prometheus:
    restart: always
    ports: []  # Do not expose prometheus admin port in production

  grafana:
    restart: always
    ports:
      - "3000:3000"
